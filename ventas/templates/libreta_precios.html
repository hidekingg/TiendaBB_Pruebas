{% extends 'base.html' %}
{% load static %}

{% block header_title %}Libreta de Compras{% endblock %}

{% block content %}
<script src="//unpkg.com/alpinejs" defer></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
    [x-cloak] { display: none !important; }
    /* Inputs más grandes y cómodos para celular */
    .input-box { 
        width: 100%; border: 2px solid #cbd5e1; border-radius: 0.75rem; 
        padding: 0.75rem; font-weight: 700; color: #111827; font-size: 1.125rem;
        transition: all 0.2s;
    }
    .input-box:focus { border-color: #3e1717; outline: none; box-shadow: 0 0 0 2px rgba(62,23,23,0.2); }
</style>

<div class="max-w-3xl mx-auto pb-28 px-3 md:px-4" x-data="libretaManager()">

    <div class="bg-white p-5 rounded-2xl shadow-md mb-6 sticky top-2 z-20 border-2 border-gray-100">
        <label class="block text-lg font-black text-[#3e1717] mb-3">🔎 ¿Qué vas a buscar hoy?</label>
        <input type="text" x-model="searchQuery" @input.debounce.500ms="searchProducts()" 
               class="input-box text-xl shadow-inner bg-gray-50" placeholder="Ej: Jabón, Coca, Chetos...">
    </div>

    <div class="space-y-6">
        
        <div x-show="isLoading" class="text-center text-gray-500 font-bold py-6 text-xl">
            Buscando... ⏳
        </div>
        
        <div x-show="searchQuery.length > 2 && products.length === 0 && !isLoading" class="text-center text-gray-600 bg-white p-8 rounded-2xl border-2 border-dashed border-gray-300 font-bold text-lg">
            No encontré ningún producto con ese nombre.
        </div>

        <template x-for="prod in products" :key="prod.id">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
                
                <div class="p-4 bg-gray-50 border-b-2 border-gray-200 flex items-center gap-4">
                    <div class="h-16 w-16 bg-white rounded-xl border-2 border-gray-200 flex items-center justify-center shrink-0 p-1">
                        <img x-show="prod.photo" :src="prod.photo" class="w-full h-full object-contain">
                        <svg x-show="!prod.photo" class="w-10 h-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xl font-black text-gray-900 leading-tight" x-text="prod.name"></h3>
                        <p class="text-sm text-gray-500 font-bold mt-1" x-text="prod.barcode"></p>
                    </div>
                </div>

                <div class="p-0">
                    <template x-for="(prov, idx) in prod.suppliers" :key="idx">
                        
                        <div class="border-b-2 border-gray-100 last:border-b-0 p-4 active:bg-yellow-100 transition-colors" 
                             :class="editingId === `${prod.id}-${prov.supplier_id}` ? 'bg-yellow-50' : ''">
                            
                            <div x-show="editingId !== `${prod.id}-${prov.supplier_id}`" @click="startEdit(prod.id, prov)" class="cursor-pointer">
                                <div class="flex flex-col gap-2">
                                    
                                    <div class="flex justify-between items-start">
                                        <div class="flex-1 pr-2">
                                            <p class="font-black text-gray-900 text-lg flex items-center gap-1 leading-tight">
                                                <span x-show="prov.is_primary" title="Proveedor Principal" class="text-yellow-500 text-xl">⭐</span>
                                                <span x-text="prov.name"></span>
                                            </p>
                                        </div>
                                        <div class="text-right shrink-0">
                                            <p class="text-3xl font-black text-[#3e1717]" x-text="`$${prov.cost.toFixed(2)}`"></p>
                                        </div>
                                    </div>
                                    
                                    <div class="flex justify-between items-end">
                                        <div class="flex-1">
                                            <p class="text-base text-blue-700 font-bold bg-blue-50 inline-block px-2 py-1 rounded-lg" x-show="prov.notes" x-text="`📝 ${prov.notes}`"></p>
                                            <p class="text-sm text-gray-500 font-medium mt-1" x-text="`Actualizado: ${prov.last_updated}`"></p>
                                        </div>
                                        <div class="shrink-0 pb-1">
                                            <span class="text-sm font-bold text-gray-500 bg-gray-200 px-3 py-1.5 rounded-full flex items-center gap-1">
                                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                                Editar
                                            </span>
                                        </div>
                                    </div>

                                </div>
                            </div>

                            <div x-show="editingId === `${prod.id}-${prov.supplier_id}`" x-cloak class="pt-2">
                                <p class="text-base font-black text-[#3e1717] mb-3 uppercase border-b pb-2">✏️ Actualizar: <span x-text="prov.name"></span></p>
                                
                                <div class="flex flex-col gap-4 mb-4">
                                    <div>
                                        <label class="block text-base font-bold text-gray-800 mb-1">Costo Unitario ($)</label>
                                        <input type="number" step="0.50" x-model="editData.cost" class="input-box text-center text-2xl text-[#3e1717]" placeholder="0.00">
                                    </div>
                                    <div>
                                        <label class="block text-base font-bold text-gray-800 mb-1">Notas (Mayoreo, promos, etc)</label>
                                        <input type="text" x-model="editData.notes" class="input-box text-lg text-blue-800" placeholder="Ej: A $13 llevando 6">
                                    </div>
                                </div>
                                
                                <div class="flex gap-3 pt-2">
                                    <button @click="cancelEdit()" class="flex-1 py-4 rounded-xl text-gray-700 text-lg font-black bg-gray-200 active:bg-gray-300">Cancelar</button>
                                    <button @click="saveEdit(prod.id, prov.supplier_id)" class="flex-1 py-4 rounded-xl text-white text-lg font-black bg-[#3e1717] shadow-lg active:scale-95">Guardar</button>
                                </div>
                            </div>
                            
                        </div>
                    </template>

                    <div class="p-4 bg-gray-50 border-t-2 border-gray-100">
                        <button @click="openAddSupplier(prod.id)" class="w-full py-3 bg-white border-2 border-dashed border-[#3e1717] text-[#3e1717] rounded-xl text-base font-black flex items-center justify-center gap-2 active:bg-yellow-50">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                            Agregar otro proveedor a la lista
                        </button>
                    </div>

                </div>
            </div>
        </template>
    </div>

    <div x-show="showAddModal" x-cloak class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-3 bg-black/70 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all" @click.away="showAddModal = false">
            <div class="bg-[#3e1717] p-5 flex justify-between items-center">
                <h3 class="text-xl font-black text-white">Vincular Proveedor</h3>
                <button @click="showAddModal = false" class="text-white p-1 bg-white/20 rounded-lg"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            
            <div class="p-6 space-y-5 overflow-y-auto max-h-[70vh]">
                <div>
                    <label class="block text-base font-black text-gray-800 mb-2">Selecciona al Proveedor</label>
                    <select x-model="newSupplierData.supplier_id" class="input-box bg-white text-lg">
                        <option value="">-- Toca para elegir --</option>
                        {% for p in proveedores %}
                            <option value="{{ p.supplier_id }}">{{ p.company_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-base font-black text-gray-800 mb-2">Costo ($)</label>
                    <input type="number" step="0.50" x-model="newSupplierData.cost" class="input-box text-center text-2xl text-[#3e1717]" placeholder="0.00">
                </div>
                
                <div>
                    <label class="block text-base font-black text-gray-800 mb-2">Notas Especiales</label>
                    <input type="text" x-model="newSupplierData.notes" class="input-box text-lg" placeholder="Anota el trato o mayoreo...">
                </div>
                
                <button @click="saveNewSupplier()" class="w-full py-4 mt-4 bg-[#3e1717] text-white text-xl font-black rounded-xl shadow-lg active:scale-95 transition disabled:opacity-50" :disabled="!newSupplierData.supplier_id">
                    Guardar Nuevo Precio
                </button>
            </div>
        </div>
    </div>

</div>

<script>
    function libretaManager() {
        return {
            searchQuery: '',
            products: [],
            isLoading: false,
            
            editingId: null,
            editData: { cost: '', notes: '' },
            
            showAddModal: false,
            activeProductId: null,
            newSupplierData: { supplier_id: '', cost: '', notes: '' },

            async searchProducts() {
                if (this.searchQuery.length < 2) { this.products = []; return; }
                this.isLoading = true;
                try {
                    const res = await fetch(`/api/compras/libreta/buscar/?q=${this.searchQuery}`);
                    if (res.ok) this.products = await res.json();
                } catch (e) { console.error(e); }
                this.isLoading = false;
            },

            startEdit(prodId, prov) {
                this.editingId = `${prodId}-${prov.supplier_id}`;
                this.editData.cost = prov.cost;
                this.editData.notes = prov.notes;
            },

            cancelEdit() {
                this.editingId = null;
            },

            async saveEdit(prodId, suppId) {
                const form = new FormData();
                form.append('product_id', prodId);
                form.append('supplier_id', suppId);
                form.append('cost', this.editData.cost || 0);
                form.append('notes', this.editData.notes || '');

                try {
                    const res = await fetch('/api/compras/libreta/actualizar/', { method: 'POST', body: form });
                    const data = await res.json();
                    if(data.status === 'success') {
                        Swal.fire({icon:'success', title:'¡Guardado!', toast:true, position:'top', showConfirmButton:false, timer:2000});
                        this.editingId = null;
                        this.searchProducts(); 
                    }
                } catch (e) { Swal.fire('Error', 'Fallo de red', 'error'); }
            },

            openAddSupplier(prodId) {
                this.activeProductId = prodId;
                this.newSupplierData = { supplier_id: '', cost: '', notes: '' };
                this.showAddModal = true;
            },

            async saveNewSupplier() {
                if(!this.newSupplierData.supplier_id) return;
                
                const form = new FormData();
                form.append('product_id', this.activeProductId);
                form.append('supplier_id', this.newSupplierData.supplier_id);
                form.append('cost', this.newSupplierData.cost || 0);
                form.append('notes', this.newSupplierData.notes || '');

                try {
                    const res = await fetch('/api/compras/libreta/actualizar/', { method: 'POST', body: form });
                    const data = await res.json();
                    if(data.status === 'success') {
                        this.showAddModal = false;
                        Swal.fire({icon:'success', title:'¡Viculado!', toast:true, position:'top', showConfirmButton:false, timer:2000});
                        this.searchProducts(); 
                    }
                } catch (e) { Swal.fire('Error', 'Fallo de red', 'error'); }
            }
        }
    }
</script>
{% endblock %}
