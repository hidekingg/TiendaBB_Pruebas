{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full border-t-4 border-[#3e1717]">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Apertura de Caja</h2>
        <p class="text-gray-600 mb-6">Ingresa el fondo inicial para comenzar el turno.</p>
        
        <form method="POST" action="{% url 'abrir_caja' %}">
            {% csrf_token %}
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Fondo Inicial (Monedas/Billetes)</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-500">$</span>
                    <input type="number" step="0.01" name="monto_inicial" required
                           class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded focus:ring-[#3e1717] focus:border-[#3e1717] text-xl font-bold text-gray-800"
                           placeholder="0.00" value="0.00">
                </div>
            </div>
            
            <button type="submit" class="w-full bg-[#3e1717] text-white font-bold py-3 px-4 rounded hover:bg-[#2a1010] transition">
                ABRIR TURNO
            </button>
        </form>
    </div>
</div>
{% endblock %}
